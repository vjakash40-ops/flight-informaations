<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Spotify Style Music Player</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:Arial, sans-serif;
    background:url("https://images.unsplash.com/photo-1507874457470-272b3c8d8ee2") center/cover no-repeat;
}

.player{
    background:rgba(255,255,255,0.92);
    padding:25px;
    width:340px;
    border-radius:18px;
    box-shadow:0 15px 40px rgba(0,0,0,0.3);
}

h2{
    text-align:center;
    margin-bottom:10px;
}

input{
    width:100%;
    padding:10px;
    border-radius:25px;
    border:1px solid #ccc;
    outline:none;
    margin-bottom:10px;
}

.song{
    padding:8px;
    border-radius:10px;
    cursor:pointer;
}

.song:hover{
    background:#ecebff;
}

.song-list{
    max-height:150px;
    overflow-y:auto;
}

.controls{
    text-align:center;
    margin-top:10px;
}

.controls button{
    padding:10px 15px;
    border:none;
    margin:5px;
    border-radius:50%;
    background:#6c63ff;
    color:white;
    font-size:16px;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="player">
    <h2 id="nowPlaying">Search & Play 🎶</h2>

    <input type="text" id="search" placeholder="Search songs..." oninput="filterSongs()" onkeydown="enterPlay(event)">

    <div class="song-list" id="songList"></div>

    <audio id="audio"></audio>

    <div class="controls">
        <button onclick="togglePlay()">▶️</button>
        <button onclick="nextSong()">⏭️</button>
        <button onclick="mute()">🔇</button>
    </div>
</div>

<script>
const songs = [
 {name:"Chill Vibes", src:"https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"},
 {name:"Relax Beats", src:"https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3"},
 {name:"LoFi Mood", src:"https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3"},
 {name:"Peaceful Tune", src:"https://www.soundhelix.com/examples/mp3/SoundHelix-Song-4.mp3"},
 {name:"Night Walk", src:"https://www.soundhelix.com/examples/mp3/SoundHelix-Song-5.mp3"}
];

let currentIndex = -1;
const audio = document.getElementById("audio");
const list = document.getElementById("songList");
const title = document.getElementById("nowPlaying");

function renderSongs(filtered){
    list.innerHTML="";
    filtered.forEach((song,i)=>{
        const div=document.createElement("div");
        div.className="song";
        div.innerText=song.name;
        div.onclick=()=>playSong(songs.indexOf(song));
        list.appendChild(div);
    });
}

function playSong(i){
    currentIndex=i;
    audio.src=songs[i].src;
    title.innerText="Now Playing: " + songs[i].name;
    audio.play();
}

function filterSongs(){
    const value=document.getElementById("search").value.toLowerCase();
    const filtered=songs.filter(s=>s.name.toLowerCase().includes(value));
    renderSongs(filtered);
}

function enterPlay(e){
    if(e.key==="Enter"){
        const value=document.getElementById("search").value.toLowerCase();
        const found=songs.find(s=>s.name.toLowerCase().includes(value));
        if(found) playSong(songs.indexOf(found));
    }
}

function togglePlay(){
    if(audio.paused) audio.play();
    else audio.pause();
}

function nextSong(){
    currentIndex=(currentIndex+1)%songs.length;
    playSong(currentIndex);
}

function mute(){
    audio.muted=!audio.muted;
}

renderSongs(songs);
</script>

</body>
</html>
